<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FakeLock</title>
  <style>
    /**
     * FakeLock Overlay - Beautiful Animations
     * Following ui-animation guidelines:
     * - Only animate transform and opacity
     * - Duration: 100-350ms for UI interactions
     * - Easing: cubic-bezier(0.22, 1, 0.36, 1) for enter
     * - Beautiful, mesmerizing animations
     */

    :root {
      --accent: #f59e0b;
      --text-color: #f0f0f5;
      --text-size: 64px;
      --bg-color: #0a0a0f;

      /* Animation tokens */
      --ease-enter: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-move: cubic-bezier(0.25, 1, 0.5, 1);
      --dur-micro: 100ms;
      --dur-fast: 150ms;
      --dur-normal: 200ms;
      --dur-slow: 350ms;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    body {
      position: relative;
    }

    .overlay {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      background: var(--bg-color);
      animation: overlay-enter 400ms var(--ease-enter) backwards;
    }

    @keyframes overlay-enter {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .message {
      font-size: var(--text-size);
      font-weight: 300;
      color: var(--text-color);
      margin-bottom: 32px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
      letter-spacing: 0.05em;
      text-align: center;
      padding: 0 20px;
      animation: message-enter 500ms var(--ease-enter) backwards;
      animation-delay: 100ms;
    }

    @keyframes message-enter {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .hint {
      font-size: 14px;
      color: rgba(255,255,255,0.4);
      margin-top: 20px;
      font-family: system-ui, -apple-system, sans-serif;
      transition: opacity var(--dur-fast) var(--ease-enter);
    }

    .password-container {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: container-enter 400ms var(--ease-enter) backwards;
      animation-delay: 200ms;
    }

    @keyframes container-enter {
      from {
        opacity: 0;
        transform: scale(0.92);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .password-input {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 14px 32px;
      font-size: 20px;
      color: white;
      text-align: center;
      outline: none;
      width: 300px;
      font-family: inherit;
      transition:
        border-color var(--dur-fast) var(--ease-enter),
        box-shadow var(--dur-fast) var(--ease-enter);
    }

    .password-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.15),
                  0 0 30px rgba(245, 158, 11, 0.1);
    }

    .password-input::placeholder {
      color: rgba(255,255,255,0.35);
    }

    .loader-container {
      position: relative;
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: loader-enter 400ms var(--ease-enter) backwards;
      animation-delay: 150ms;
    }

    @keyframes loader-enter {
      from {
        opacity: 0;
        transform: scale(0.85);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* ============================================
       ANIMATION 1: NEON RINGS
       Beautiful glowing concentric rings
       ============================================ */
    .neon-rings-loader {
      position: relative;
      width: 80px;
      height: 80px;
    }

    .neon-rings-loader .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
      animation: neon-spin 2s linear infinite;
    }

    .neon-rings-loader .ring:nth-child(1) {
      border-top-color: var(--accent);
      filter: drop-shadow(0 0 6px var(--accent));
    }

    .neon-rings-loader .ring:nth-child(2) {
      inset: 8px;
      border-right-color: var(--accent);
      filter: drop-shadow(0 0 4px var(--accent));
      animation-duration: 1.5s;
      animation-direction: reverse;
    }

    .neon-rings-loader .ring:nth-child(3) {
      inset: 16px;
      border-bottom-color: var(--accent);
      filter: drop-shadow(0 0 2px var(--accent));
      animation-duration: 1s;
    }

    @keyframes neon-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ============================================
       ANIMATION 2: PULSE DOTS
       Breathing dots in a radial pattern
       ============================================ */
    .pulse-dots-loader {
      position: relative;
      width: 80px;
      height: 80px;
    }

    .pulse-dots-loader .dot {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      filter: drop-shadow(0 0 8px var(--accent));
      animation: pulse-breathe 1.2s ease-in-out infinite;
    }

    .pulse-dots-loader .dot:nth-child(1) { top: 0; left: 36px; animation-delay: 0s; }
    .pulse-dots-loader .dot:nth-child(2) { top: 12px; left: 12px; animation-delay: 0.1s; }
    .pulse-dots-loader .dot:nth-child(3) { top: 36px; left: 0; animation-delay: 0.2s; }
    .pulse-dots-loader .dot:nth-child(4) { top: 60px; left: 12px; animation-delay: 0.3s; }
    .pulse-dots-loader .dot:nth-child(5) { top: 72px; left: 36px; animation-delay: 0.4s; }
    .pulse-dots-loader .dot:nth-child(6) { top: 60px; right: 12px; animation-delay: 0.5s; }
    .pulse-dots-loader .dot:nth-child(7) { top: 36px; right: 0; animation-delay: 0.6s; }
    .pulse-dots-loader .dot:nth-child(8) { top: 12px; right: 12px; animation-delay: 0.7s; }
    .pulse-dots-loader .dot:nth-child(9) { top: 36px; left: 36px; animation-delay: 0.8s; animation-duration: 1s; }

    @keyframes pulse-breathe {
      0%, 100% {
        transform: scale(0.6);
        opacity: 0.4;
      }
      50% {
        transform: scale(1.3);
        opacity: 1;
      }
    }

    /* ============================================
       ANIMATION 3: BOUNCE DOTS
       Classic bouncing ball animation
       ============================================ */
    .bounce-dots-loader {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: center;
    }

    .bounce-dots-loader .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      filter: drop-shadow(0 0 6px var(--accent));
      animation: bounce-up 600ms ease-in-out infinite;
    }

    .bounce-dots-loader .dot:nth-child(1) { animation-delay: 0ms; }
    .bounce-dots-loader .dot:nth-child(2) { animation-delay: 100ms; }
    .bounce-dots-loader .dot:nth-child(3) { animation-delay: 200ms; }

    @keyframes bounce-up {
      0%, 100% {
        transform: translateY(0);
        opacity: 0.5;
      }
      50% {
        transform: translateY(-24px);
        opacity: 1;
      }
    }

    /* ============================================
       ANIMATION 4: WAVE DOTS
       Smooth wave animation
       ============================================ */
    .wave-dots-loader {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }

    .wave-dots-loader .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      filter: drop-shadow(0 0 4px var(--accent));
      animation: wave-motion 800ms ease-in-out infinite;
    }

    .wave-dots-loader .dot:nth-child(1) { animation-delay: 0ms; }
    .wave-dots-loader .dot:nth-child(2) { animation-delay: 60ms; }
    .wave-dots-loader .dot:nth-child(3) { animation-delay: 120ms; }
    .wave-dots-loader .dot:nth-child(4) { animation-delay: 180ms; }
    .wave-dots-loader .dot:nth-child(5) { animation-delay: 240ms; }
    .wave-dots-loader .dot:nth-child(6) { animation-delay: 300ms; }
    .wave-dots-loader .dot:nth-child(7) { animation-delay: 360ms; }

    @keyframes wave-motion {
      0%, 100% {
        transform: scaleY(0.6);
        opacity: 0.4;
      }
      50% {
        transform: scaleY(1.3);
        opacity: 1;
      }
    }

    /* ============================================
       ANIMATION 5: ORBIT
       Orbiting dot around center
       ============================================ */
    .orbit-loader {
      position: relative;
      width: 70px;
      height: 70px;
    }

    .orbit-loader .center {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      filter: drop-shadow(0 0 8px var(--accent));
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .orbit-loader .orbit-dot {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      filter: drop-shadow(0 0 6px var(--accent));
      top: 50%;
      left: 50%;
      margin: -5px;
      animation: orbit-spin 1.2s linear infinite;
      transform-origin: 0 35px;
    }

    .orbit-loader .trail {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.4;
      top: 50%;
      left: 50%;
      margin: -3px;
      animation: orbit-spin 1.2s linear infinite;
      transform-origin: 0 35px;
    }

    .orbit-loader .trail:nth-child(3) { animation-delay: 0.15s; }
    .orbit-loader .trail:nth-child(4) { animation-delay: 0.3s; }

    @keyframes orbit-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ============================================
       ANIMATION 6: SPINNER
       Elegant multi-layer spinner
       ============================================ */
    .spinner-loader {
      position: relative;
      width: 60px;
      height: 60px;
    }

    .spinner-loader .circle {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid transparent;
      animation: elegant-spin 1.4s linear infinite;
    }

    .spinner-loader .circle:nth-child(1) {
      border-top-color: var(--accent);
      filter: drop-shadow(0 0 6px var(--accent));
    }

    .spinner-loader .circle:nth-child(2) {
      inset: 8px;
      border-right-color: rgba(255,255,255,0.3);
      animation-duration: 1s;
      animation-direction: reverse;
    }

    .spinner-loader .circle:nth-child(3) {
      inset: 16px;
      border-bottom-color: var(--accent);
      filter: drop-shadow(0 0 3px var(--accent));
      animation-duration: 0.8s;
    }

    @keyframes elegant-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ============================================
       ANIMATION 7: RUNNING FIGURE
       Animated running person
       ============================================ */
    .running-loader {
      position: relative;
      width: 80px;
      height: 80px;
    }

    .running-loader .figure {
      position: absolute;
      width: 32px;
      height: 50px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .running-loader .head {
      position: absolute;
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      animation: run-head 300ms ease-in-out infinite;
    }

    .running-loader .body {
      position: absolute;
      width: 4px;
      height: 18px;
      background: var(--accent);
      border-radius: 2px;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      animation: run-body 300ms ease-in-out infinite;
      transform-origin: top center;
    }

    .running-loader .arm {
      position: absolute;
      width: 14px;
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
      top: 14px;
      animation: run-arm 300ms ease-in-out infinite;
      transform-origin: right center;
    }

    .running-loader .arm.left {
      right: 50%;
      animation-name: run-arm-left;
    }

    .running-loader .arm.right {
      left: 50%;
      animation-name: run-arm-right;
    }

    .running-loader .leg {
      position: absolute;
      width: 3px;
      height: 16px;
      background: var(--accent);
      border-radius: 2px;
      top: 30px;
      animation: run-leg 300ms ease-in-out infinite;
      transform-origin: top center;
    }

    .running-loader .leg.left {
      right: 50%;
      animation-name: run-leg-left;
    }

    .running-loader .leg.right {
      left: 50%;
      animation-name: run-leg-right;
    }

    .running-loader .shadow {
      position: absolute;
      width: 24px;
      height: 6px;
      background: rgba(0,0,0,0.25);
      border-radius: 50%;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      animation: run-shadow 300ms ease-in-out infinite;
    }

    @keyframes run-head {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-2px); }
    }

    @keyframes run-body {
      0%, 100% { transform: translateX(-50%) rotate(0deg); }
      25% { transform: translateX(-50%) rotate(10deg); }
      75% { transform: translateX(-50%) rotate(-10deg); }
    }

    @keyframes run-arm-left {
      0%, 100% { transform: rotate(30deg); }
      50% { transform: rotate(-30deg); }
    }

    @keyframes run-arm-right {
      0%, 100% { transform: rotate(-30deg); }
      50% { transform: rotate(30deg); }
    }

    @keyframes run-leg-left {
      0%, 100% { transform: rotate(25deg); }
      50% { transform: rotate(-25deg); }
    }

    @keyframes run-leg-right {
      0%, 100% { transform: rotate(-25deg); }
      50% { transform: rotate(25deg); }
    }

    @keyframes run-shadow {
      0%, 100% {
        transform: translateX(-50%) scale(1);
        opacity: 0.25;
      }
      50% {
        transform: translateX(-50%) scale(0.7);
        opacity: 0.15;
      }
    }

    /* ============================================
       ANIMATION 8: DANCE DISC
       Disco ball with bouncing dot
       ============================================ */
    .dance-loader {
      position: relative;
      width: 60px;
      height: 60px;
    }

    .dance-loader .disc {
      position: absolute;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, rgba(255,255,255,0.1) 50%);
      filter: drop-shadow(0 0 12px var(--accent));
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: dance-rotate 600ms ease-in-out infinite;
    }

    .dance-loader .dot {
      position: absolute;
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: dance-bounce 600ms ease-in-out infinite;
    }

    @keyframes dance-rotate {
      0%, 100% {
        transform: translate(-50%, -50%) rotate(0deg) scale(1);
      }
      25% {
        transform: translate(-50%, -50%) rotate(12deg) scale(1.05);
      }
      75% {
        transform: translate(-50%, -50%) rotate(-12deg) scale(0.95);
      }
    }

    @keyframes dance-bounce {
      0%, 100% {
        transform: translate(-50%, -50%) translateY(-18px);
      }
      50% {
        transform: translate(-50%, -50%) translateY(-28px);
      }
    }

    /* ============================================
       ANIMATION 9: INFINITY
       Figure-8 infinity symbol
       ============================================ */
    .infinity-loader {
      position: relative;
      width: 80px;
      height: 40px;
    }

    .infinity-loader .path {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    .infinity-loader .path::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      background: var(--accent);
      border-radius: 50%;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      filter: drop-shadow(0 0 6px var(--accent));
      animation: infinity-move 1.5s ease-in-out infinite;
    }

    .infinity-loader .path:nth-child(2)::before {
      animation-delay: 0.75s;
    }

    @keyframes infinity-move {
      0% {
        left: 0;
        transform: translateY(-50%) scale(0.8);
      }
      50% {
        left: calc(100% - 14px);
        transform: translateY(-50%) scale(1.2);
      }
      100% {
        left: 0;
        transform: translateY(-50%) scale(0.8);
      }
    }

    /* ============================================
       ANIMATION 10: GEOMETRIC ROTATION
       Rotating geometric shapes
       ============================================ */
    .geo-loader {
      position: relative;
      width: 60px;
      height: 60px;
    }

    .geo-loader .shape {
      position: absolute;
      inset: 0;
      animation: geo-spin 2s linear infinite;
    }

    .geo-loader .shape::before {
      content: '';
      position: absolute;
      inset: 5px;
      border: 2px solid var(--accent);
      border-radius: 4px;
      filter: drop-shadow(0 0 4px var(--accent));
    }

    .geo-loader .shape:nth-child(2) {
      animation-direction: reverse;
      animation-duration: 1.5s;
    }

    .geo-loader .shape:nth-child(2)::before {
      inset: 15px;
      border-radius: 50%;
      border-color: rgba(255,255,255,0.4);
    }

    .geo-loader .shape:nth-child(3) {
      animation-duration: 1s;
    }

    .geo-loader .shape:nth-child(3)::before {
      inset: 25px;
      border-radius: 2px;
      border-color: var(--accent);
      opacity: 0.6;
    }

    @keyframes geo-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ============================================
       ANIMATION 11: MORPHING BLOB
       Organic morphing shape
       ============================================ */
    .blob-loader {
      position: relative;
      width: 80px;
      height: 80px;
    }

    .blob-loader .blob {
      position: absolute;
      inset: 0;
      background: var(--accent);
      border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
      filter: drop-shadow(0 0 20px var(--accent));
      animation: blob-morph 2s ease-in-out infinite;
    }

    .blob-loader .blob-inner {
      position: absolute;
      inset: 10px;
      background: var(--bg-color);
      border-radius: inherit;
      animation: blob-morph 2s ease-in-out infinite reverse;
    }

    @keyframes blob-morph {
      0%, 100% {
        border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
        transform: rotate(0deg);
      }
      50% {
        border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%;
        transform: rotate(180deg);
      }
    }

    /* ============================================
       ANIMATION 12: DNA HELIX
       Animated double helix
       ============================================ */
    .dna-loader {
      position: relative;
      width: 40px;
      height: 80px;
    }

    .dna-loader .strand {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    .dna-loader .strand::before,
    .dna-loader .strand::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      filter: drop-shadow(0 0 4px var(--accent));
      animation: dna-float 1s ease-in-out infinite;
    }

    .dna-loader .strand::before {
      left: 0;
      animation-delay: 0s;
    }

    .dna-loader .strand::after {
      right: 0;
      animation-delay: 0.5s;
    }

    .dna-loader .connector {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 24px;
      height: 2px;
      background: rgba(255,255,255,0.3);
      transform: translate(-50%, -50%);
      animation: dna-pulse 1s ease-in-out infinite;
    }

    @keyframes dna-float {
      0%, 100% {
        transform: translateY(-25px);
        opacity: 0.3;
      }
      50% {
        transform: translateY(25px);
        opacity: 1;
      }
    }

    @keyframes dna-pulse {
      0%, 100% {
        transform: translate(-50%, -50%) scaleX(0.5);
        opacity: 0.3;
      }
      50% {
        transform: translate(-50%, -50%) scaleX(1);
        opacity: 0.6;
      }
    }

    /* Error state animation */
    .password-input.error {
      border-color: #ef4444;
      animation: shake 400ms ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay">
    <div class="message" id="lockMessage">System Locked</div>

    <div class="loader-container">
      <!-- Neon Rings (default) -->
      <div class="neon-rings-loader" id="anim-neon-rings">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
      </div>

      <!-- Pulse Dots -->
      <div class="pulse-dots-loader" id="anim-pulse-dots" style="display:none">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <!-- Bounce Dots -->
      <div class="bounce-dots-loader" id="anim-bounce-dots" style="display:none">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <!-- Wave Dots -->
      <div class="wave-dots-loader" id="anim-wave-dots" style="display:none">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <!-- Orbit -->
      <div class="orbit-loader" id="anim-orbit" style="display:none">
        <div class="center"></div>
        <div class="trail"></div>
        <div class="trail"></div>
        <div class="orbit-dot"></div>
      </div>

      <!-- Spinner -->
      <div class="spinner-loader" id="anim-spinner" style="display:none">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
      </div>

      <!-- Running Figure -->
      <div class="running-loader" id="anim-running" style="display:none">
        <div class="figure">
          <div class="head"></div>
          <div class="body"></div>
          <div class="arm left"></div>
          <div class="arm right"></div>
          <div class="leg left"></div>
          <div class="leg right"></div>
        </div>
        <div class="shadow"></div>
      </div>

      <!-- Dance -->
      <div class="dance-loader" id="anim-dance" style="display:none">
        <div class="disc"></div>
        <div class="dot"></div>
      </div>

      <!-- Infinity -->
      <div class="infinity-loader" id="anim-infinity" style="display:none">
        <div class="path"></div>
        <div class="path"></div>
      </div>

      <!-- Geometric -->
      <div class="geo-loader" id="anim-geo" style="display:none">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
      </div>

      <!-- Blob -->
      <div class="blob-loader" id="anim-blob" style="display:none">
        <div class="blob"></div>
        <div class="blob-inner"></div>
      </div>

      <!-- DNA -->
      <div class="dna-loader" id="anim-dna" style="display:none">
        <div class="strand"></div>
        <div class="strand"></div>
        <div class="connector"></div>
      </div>
    </div>

    <div class="password-container">
      <input
        type="password"
        class="password-input"
        id="passwordInput"
        placeholder="Enter password..."
        autocomplete="off"
        aria-label="Password to unlock"
      >
    </div>
    <div class="hint" id="hint">Press Enter to unlock</div>
  </div>

  <script>
    (function() {
      'use strict';

      // Parse URL parameters
      const params = new URLSearchParams(window.location.search);
      const accent = params.get('accent') || '#f59e0b';
      const textColor = params.get('text') || '#f0f0f5';
      const textSize = params.get('size') || '64';
      const bgColor = params.get('bg') || '#0a0a0f';
      const animType = params.get('anim') || 'neon-rings';
      const hintText = params.get('hint') || 'Press Enter to unlock';
      const placeholderText = params.get('placeholder') || 'Enter password...';

      // Apply CSS custom properties
      document.documentElement.style.setProperty('--accent', accent);
      document.documentElement.style.setProperty('--text-color', textColor);
      document.documentElement.style.setProperty('--text-size', textSize + 'px');
      document.documentElement.style.setProperty('--bg-color', bgColor);

      // Set lock message
      const lockMessageEl = document.getElementById('lockMessage');
      if (lockMessageEl) {
        lockMessageEl.textContent = decodeURIComponent(params.get('msg') || 'System Locked');
      }

      // Set hint text
      const hintEl = document.getElementById('hint');
      if (hintEl) {
        hintEl.textContent = decodeURIComponent(hintText);
      }

      // Set password placeholder
      const passwordInput = document.getElementById('passwordInput');
      if (passwordInput) {
        passwordInput.placeholder = decodeURIComponent(placeholderText);
      }

      // Show/hide animation based on type
      const showAnim = params.get('showAnim') !== 'false';
      const loaderContainer = document.querySelector('.loader-container');
      if (!showAnim && loaderContainer) {
        loaderContainer.style.display = 'none';
      }

      // Hide all animations first
      const animationIds = [
        'neon-rings', 'pulse-dots', 'bounce-dots', 'wave-dots',
        'orbit', 'spinner', 'running', 'dance', 'infinity',
        'geo', 'blob', 'dna'
      ];
      animationIds.forEach(function(t) {
        var el = document.getElementById('anim-' + t);
        if (el) {
          el.style.display = 'none';
        }
      });

      // Show selected animation
      var selectedAnim = document.getElementById('anim-' + animType);
      if (selectedAnim) {
        selectedAnim.style.display = 'flex';
      }

      // Tauri invoke wrapper
      var invoke = window.__TAURI__ ? window.__TAURI__.core.invoke : function() {};

      // Re-get elements that were set earlier
      passwordInput = document.getElementById('passwordInput');
      hint = document.getElementById('hint');

      var storedPassword = '';
      var currentInput = '';

      // Load stored password
      if (typeof invoke === 'function') {
        invoke('get_settings').then(function(s) {
          storedPassword = s.password;
        }).catch(function() {});
      }

      function tryUnlock() {
        if (!storedPassword) return;

        if (currentInput === storedPassword) {
          if (typeof invoke === 'function') {
            invoke('unlock_system').then(function() {
              window.close();
            }).catch(function(e) {
              console.error(e);
            });
          } else {
            window.close();
          }
        } else if (currentInput.length >= storedPassword.length) {
          if (hint) {
            hint.textContent = 'Wrong password!';
            hint.style.color = '#ef4444';
          }
          if (passwordInput) {
            passwordInput.classList.add('error');
            setTimeout(function() {
              currentInput = '';
              if (passwordInput) {
                passwordInput.value = '';
                passwordInput.classList.remove('error');
              }
              if (hint) {
                hint.textContent = 'Press Enter to unlock';
                hint.style.color = 'rgba(255,255,255,0.4)';
              }
            }, 400);
          }
        }
      }

      if (passwordInput) {
        passwordInput.addEventListener('input', function(e) {
          currentInput = e.target.value;
          tryUnlock();
        });

        passwordInput.addEventListener('keydown', function(e) {
          if (e.key === 'Enter') {
            tryUnlock();
          }
        });
      }

      // Block system keys
      document.addEventListener('keydown', function(e) {
        if (e.altKey && e.key === 'Tab') e.preventDefault();
        if (e.ctrlKey && e.shiftKey && e.key === 'Escape') e.preventDefault();
        if (e.key === 'Escape') e.preventDefault();
      });

      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
      });

      // Focus password input
      if (passwordInput) {
        passwordInput.focus();
      }
    })();
  </script>
</body>
</html>
